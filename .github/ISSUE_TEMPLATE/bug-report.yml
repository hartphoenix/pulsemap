name: Bug report
description: Something is broken in the SDK, schema, bootstrap pipeline, or editor.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Note:** if you're reporting a chord/lyric/timing error in a *specific map*, use the [Map Editor](https://hartphoenix.github.io/pulsemap/editor/) instead. Map data corrections do not go through issues.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDK / adapters
        - Schema / map format
        - Bootstrap pipeline (audio analysis, MIDI, lyrics)
        - Editor (web app)
        - Build / tooling
        - Documentation
        - Something else
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: "Browser/Node version, OS, pulsemap commit/version, anything else relevant"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste error output or attach screenshots if useful.
    validations:
      required: false
