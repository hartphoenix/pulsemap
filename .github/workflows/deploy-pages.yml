name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'maps/**'
      - 'editor/**'

  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build editor
        working-directory: editor
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build site directory
        run: |
          mkdir -p _site/maps/midi _site/editor
          cp maps/*.json _site/maps/ 2>/dev/null || true
          cp maps/midi/*.mid _site/maps/midi/ 2>/dev/null || true
          cp -r editor/dist/* _site/editor/
          touch _site/.nojekyll

          # SPA fallback: GitHub Pages serves 404.html at the site root
          # for any unknown path. Redirect /pulsemap/editor/* deep links
          # back to the editor's index.html preserving path and query.
          cat > _site/404.html << 'FALLBACK'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8">
          <script>
            var p = window.location.pathname;
            if (p.startsWith('/pulsemap/editor/')) {
              var s = window.location.search;
              var sep = s ? s + '&' : '?';
              window.location.replace('/pulsemap/editor/' + sep + 'route=' + encodeURIComponent(p));
            }
          </script>
          </head>
          <body></body>
          </html>
          FALLBACK

          # Generate manifest of all maps
          node -e "
            const fs = require('fs');
            const maps = fs.readdirSync('maps')
              .filter(f => f.endsWith('.json'))
              .map(f => {
                const data = JSON.parse(fs.readFileSync('maps/' + f));
                return {
                  id: data.id,
                  title: data.metadata?.title,
                  artist: data.metadata?.artist,
                  duration_ms: data.duration_ms,
                  file: f,
                };
              });
            fs.writeFileSync('_site/maps/manifest.json', JSON.stringify(maps, null, 2));
            console.log('Generated manifest with ' + maps.length + ' maps');
          "

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
