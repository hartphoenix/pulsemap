<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseMap AB Comparison</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

#top-bar { display: flex; gap: 12px; padding: 8px 12px; background: #16213e; align-items: center; flex-shrink: 0; }
#top-bar button { font-size: 13px; cursor: pointer; background: #0f3460; color: #e0e0e0; border: 1px solid #1a4f8a; border-radius: 4px; padding: 4px 10px; }
#top-bar button:hover { background: #1a5fa8; }
#top-bar select { font-size: 13px; background: #0f3460; color: #e0e0e0; border: 1px solid #1a4f8a; border-radius: 4px; padding: 4px 8px; max-width: 320px; }
#song-info { font-size: 13px; color: #8892b0; flex: 1; text-align: center; }
#time-display { font-size: 14px; font-family: 'SF Mono', 'Fira Code', monospace; color: #64ffda; min-width: 120px; text-align: right; }

#player-row { display: flex; background: #0d1b2a; flex-shrink: 0; }
#player-container { width: 320px; height: 180px; flex-shrink: 0; background: #000; }
#method-stats { flex: 1; padding: 8px 12px; font-size: 12px; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
.method-stat { display: flex; gap: 8px; align-items: center; }
.method-label { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }

#timeline-container { flex: 1; overflow: hidden; position: relative; }
#timeline-canvas { width: 100%; height: 100%; display: block; }
#playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff6b6b; pointer-events: none; z-index: 10; left: 25%; }
#playhead::after { content: ''; position: absolute; top: 0; left: -4px; width: 10px; height: 10px; background: #ff6b6b; clip-path: polygon(50% 100%, 0 0, 100% 0); }
#seek-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; cursor: pointer; z-index: 5; }
</style>
</head>
<body>

<div id="top-bar">
  <select id="song-picker"><option value="">-- select song --</option></select>
  <button id="btn-play">Play</button>
  <button id="btn-pause">Pause</button>
  <span id="song-info">Load AB test maps</span>
  <span id="time-display">0:00.0 / 0:00</span>
</div>

<div id="player-row">
  <div id="player-container"></div>
  <div id="method-stats"></div>
</div>

<div id="timeline-container">
  <canvas id="timeline-canvas"></canvas>
  <div id="playhead"></div>
  <div id="seek-overlay"></div>
</div>

<script>
const METHODS = [
  { key: 'a', label: 'A: Baseline', color: '#ff6b6b', dir: 'maps/ab-test/a' },
  { key: 'b', label: 'B: Enhanced', color: '#64ffda', dir: 'maps/ab-test/b' },
  { key: 'c', label: 'C: WhisperX', color: '#ffd93d', dir: 'maps/ab-test/c' },
];

const SHARED_LANES = [
  { id: 'beats', label: 'Beats', color: '#64ffda88' },
  { id: 'chords', label: 'Chords', color: '#ffd93d' },
  { id: 'lyrics', label: 'Lyrics', color: '#c4b5fd' },
];

let baseMap = null;
let methodMaps = {};
let midiData = {};
let player = null;
let isPlaying = false;
let currentTimeMs = 0;
let animFrame = null;
const PLAYHEAD_RATIO = 0.25;
const PX_PER_MS = 0.15;

// --- Song Picker ---
async function populateSongPicker() {
  try {
    const resp = await fetch('/api/ab-songs');
    if (!resp.ok) return;
    const songs = await resp.json();
    const picker = document.getElementById('song-picker');
    for (const s of songs) {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = `${s.title} - ${s.artist}`;
      picker.appendChild(opt);
    }
  } catch (err) { console.error('Failed to load song list:', err); }
}

document.getElementById('song-picker').addEventListener('change', async (e) => {
  const id = e.target.value;
  if (!id) return;
  await loadSong(id);
});

populateSongPicker();

// --- YouTube Player ---
let ytReady = false;
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
window.onYouTubeIframeAPIReady = () => { ytReady = true; };

function loadYouTubeVideo(videoId) {
  if (player) player.destroy();
  player = new YT.Player('player-container', {
    width: 320, height: 180, videoId,
    playerVars: { controls: 1, modestbranding: 1, rel: 0 },
    events: {
      onStateChange: (e) => {
        isPlaying = e.data === YT.PlayerState.PLAYING;
        if (isPlaying) requestAnimFrame();
      }
    }
  });
}

// --- Load Song ---
async function loadSong(id) {
  methodMaps = {};
  baseMap = null;
  midiData = {};
  currentTimeMs = 0;

  for (const method of METHODS) {
    try {
      const resp = await fetch(`/${method.dir}/${id}.json`);
      if (resp.ok) {
        const data = await resp.json();
        methodMaps[method.key] = data;
        if (!baseMap) baseMap = data;
      }
    } catch {}
  }

  if (!baseMap) {
    document.getElementById('song-info').textContent = 'No maps found for this song';
    return;
  }

  const title = baseMap.metadata?.title || '?';
  const artist = baseMap.metadata?.artist || '?';
  const key = baseMap.metadata?.key || '?';
  const tempo = baseMap.metadata?.tempo || '?';
  const methods = Object.keys(methodMaps).join(', ').toUpperCase();
  document.getElementById('song-info').textContent =
    `${title} - ${artist} | ${key} | ${tempo} BPM | Methods: ${methods}`;

  // YouTube
  const yt = baseMap.playback?.find(p => p.platform === 'youtube');
  if (yt?.id) {
    if (ytReady) loadYouTubeVideo(yt.id);
    else setTimeout(() => loadYouTubeVideo(yt.id), 1000);
  }

  // Load MIDI
  for (const ref of (baseMap.midi || [])) {
    const label = ref.tracks?.[0]?.label;
    if (!label) continue;
    try {
      const resp = await fetch(`/${METHODS[0].dir}/midi/${ref.sha256}.mid`);
      if (!resp.ok) {
        const resp2 = await fetch(`/maps/midi/${ref.sha256}.mid`);
        if (resp2.ok) {
          const buf = await resp2.arrayBuffer();
          midiData[label] = parseMidiBasic(new Uint8Array(buf));
        }
      } else {
        const buf = await resp.arrayBuffer();
        midiData[label] = parseMidiBasic(new Uint8Array(buf));
      }
    } catch {}
  }

  updateMethodStats();
  draw();
}

function updateMethodStats() {
  const container = document.getElementById('method-stats');
  container.innerHTML = '';
  for (const method of METHODS) {
    const map = methodMaps[method.key];
    if (!map) continue;
    const words = map.words || [];
    const collapsed = words.filter(w => (w.end || w.t) - w.t < 75).length;
    const anomalies = words.filter(w => (w.end || w.t) - w.t > 2000).length;
    const prov = map.analysis?.words?.tool || '?';

    const div = document.createElement('div');
    div.className = 'method-stat';
    div.innerHTML = `
      <span class="method-label" style="background:${method.color}"></span>
      <strong>${method.label}:</strong>
      ${words.length} words, ${collapsed} collapsed, ${anomalies} anomalies
      <span style="color:#666">(${prov})</span>
    `;
    container.appendChild(div);
  }
}

// --- Controls ---
document.getElementById('btn-play').addEventListener('click', () => {
  if (player?.playVideo) player.playVideo();
});
document.getElementById('btn-pause').addEventListener('click', () => {
  if (player?.pauseVideo) player.pauseVideo();
});
document.getElementById('seek-overlay').addEventListener('click', (e) => {
  if (!baseMap || !player?.seekTo) return;
  const rect = e.target.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const canvasWidth = rect.width;
  const playheadX = canvasWidth * PLAYHEAD_RATIO;
  const offsetMs = ((clickX - playheadX) / PX_PER_MS) + currentTimeMs;
  const seekMs = Math.max(0, Math.min(baseMap.duration_ms, offsetMs));
  player.seekTo(seekMs / 1000, true);
  currentTimeMs = seekMs;
  draw();
});

// --- Animation ---
function requestAnimFrame() {
  if (animFrame) return;
  animFrame = requestAnimationFrame(tick);
}
function tick() {
  animFrame = null;
  if (player?.getCurrentTime && isPlaying) {
    currentTimeMs = player.getCurrentTime() * 1000;
    updateTimeDisplay();
    draw();
    requestAnimationFrame(tick);
  }
}
function updateTimeDisplay() {
  if (!baseMap) return;
  const cur = currentTimeMs / 1000;
  const total = baseMap.duration_ms / 1000;
  const fmt = (s) => `${Math.floor(s/60)}:${(s%60).toFixed(1).padStart(4,'0')}`;
  document.getElementById('time-display').textContent = `${fmt(cur)} / ${fmt(total)}`;
}

// --- Drawing ---
function draw() {
  const canvas = document.getElementById('timeline-canvas');
  const container = document.getElementById('timeline-container');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = container.clientWidth * dpr;
  canvas.height = container.clientHeight * dpr;
  canvas.style.width = container.clientWidth + 'px';
  canvas.style.height = container.clientHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = container.clientWidth;
  const H = container.clientHeight;

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  if (!baseMap) return;

  const playheadX = W * PLAYHEAD_RATIO;
  const visibleStartMs = currentTimeMs - (playheadX / PX_PER_MS);
  const visibleEndMs = currentTimeMs + ((W - playheadX) / PX_PER_MS);
  function msToX(ms) { return playheadX + (ms - currentTimeMs) * PX_PER_MS; }

  // Count lanes: shared lanes + one word lane per method
  const activeMethods = METHODS.filter(m => methodMaps[m.key]);
  const totalLanes = SHARED_LANES.length + activeMethods.length;
  const laneGap = 2;
  const laneHeight = Math.min(70, (H - laneGap * totalLanes) / totalLanes);

  let laneIdx = 0;

  // Shared lanes (from baseMap)
  for (const lane of SHARED_LANES) {
    const y = laneIdx * (laneHeight + laneGap);
    ctx.fillStyle = '#0d1b2a';
    ctx.fillRect(0, y, W, laneHeight);
    ctx.fillStyle = lane.color + '80';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillText(lane.label, 4, y + 12);

    if (lane.id === 'beats') drawBeats(ctx, msToX, y, laneHeight, visibleStartMs, visibleEndMs, lane.color);
    else if (lane.id === 'chords') drawChords(ctx, msToX, y, laneHeight, visibleStartMs, visibleEndMs, lane.color);
    else if (lane.id === 'lyrics') drawLyrics(ctx, msToX, y, laneHeight, visibleStartMs, visibleEndMs, lane.color);
    laneIdx++;
  }

  // Word lanes (one per method)
  for (const method of activeMethods) {
    const map = methodMaps[method.key];
    const y = laneIdx * (laneHeight + laneGap);
    ctx.fillStyle = '#0d1b2a';
    ctx.fillRect(0, y, W, laneHeight);

    // Method label
    ctx.fillStyle = method.color;
    ctx.font = 'bold 10px -apple-system, sans-serif';
    ctx.fillText(method.label, 4, y + 12);

    // Word count badge
    const wc = (map.words || []).length;
    ctx.fillStyle = method.color + '80';
    ctx.font = '9px -apple-system, sans-serif';
    ctx.fillText(`${wc}w`, 4, y + laneHeight - 4);

    drawWordsForMap(ctx, msToX, y, laneHeight, visibleStartMs, visibleEndMs, method.color, map);
    laneIdx++;
  }
}

function drawBeats(ctx, msToX, y, h, startMs, endMs, color) {
  if (!baseMap.beats) return;
  for (const beat of baseMap.beats) {
    if (beat.t < startMs - 100 || beat.t > endMs + 100) continue;
    const x = msToX(beat.t);
    ctx.strokeStyle = beat.downbeat ? color : color + '40';
    ctx.lineWidth = beat.downbeat ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(x, y + (beat.downbeat ? 0 : h * 0.3));
    ctx.lineTo(x, y + h);
    ctx.stroke();
  }
}

function drawChords(ctx, msToX, y, h, startMs, endMs, color) {
  if (!baseMap.chords) return;
  for (const chord of baseMap.chords) {
    const end = chord.end || chord.t + 1000;
    if (end < startMs || chord.t > endMs) continue;
    const x1 = msToX(chord.t);
    const x2 = msToX(end);
    ctx.fillStyle = color + '25';
    ctx.fillRect(x1, y + 2, x2 - x1, h - 4);
    ctx.strokeStyle = color + '60';
    ctx.strokeRect(x1, y + 2, x2 - x1, h - 4);
    ctx.fillStyle = color;
    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.fillText(chord.chord, Math.max(x1 + 3, 0), y + h / 2 + 4);
  }
}

function drawLyrics(ctx, msToX, y, h, startMs, endMs, color) {
  if (!baseMap.lyrics) return;
  for (const line of baseMap.lyrics) {
    const end = line.end || line.t + 2000;
    if (end < startMs || line.t > endMs) continue;
    const x1 = msToX(line.t);
    const x2 = msToX(end);
    ctx.fillStyle = color + '20';
    ctx.fillRect(x1, y + 2, x2 - x1, h - 4);
    ctx.fillStyle = color;
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText(line.text, Math.max(x1 + 3, 0), y + h / 2 + 4, x2 - x1 - 6);
  }
}

function drawWordsForMap(ctx, msToX, y, h, startMs, endMs, color, map) {
  if (!map.words) return;
  for (const word of map.words) {
    const end = word.end || word.t + 200;
    if (end < startMs || word.t > endMs) continue;
    const x1 = msToX(word.t);
    const x2 = msToX(end);
    const dur = end - word.t;

    // Color-code by quality: collapsed = red, anomaly = orange, normal = method color
    let fillColor = color + '30';
    let strokeColor = color + '50';
    if (dur < 75) { fillColor = '#ff000040'; strokeColor = '#ff000080'; }
    else if (dur > 2000) { fillColor = '#ff990040'; strokeColor = '#ff990080'; }

    ctx.fillStyle = fillColor;
    ctx.fillRect(x1, y + 16, x2 - x1, h - 20);
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = 1;
    ctx.strokeRect(x1, y + 16, x2 - x1, h - 20);
    if (x2 - x1 > 18) {
      ctx.fillStyle = color;
      ctx.font = '9px -apple-system, sans-serif';
      ctx.fillText(word.text, x1 + 2, y + h / 2 + 8, x2 - x1 - 4);
    }
  }
}

// --- Minimal MIDI parser (same as main inspector) ---
function parseMidiBasic(bytes) {
  const notes = [];
  let pos = 0;
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  function readU16() { const v = view.getUint16(pos); pos += 2; return v; }
  function readU32() { const v = view.getUint32(pos); pos += 4; return v; }
  function readVarLen() {
    let val = 0;
    for (let i = 0; i < 4; i++) {
      const b = bytes[pos++];
      val = (val << 7) | (b & 0x7f);
      if (!(b & 0x80)) break;
    }
    return val;
  }
  if (String.fromCharCode(...bytes.slice(0, 4)) !== 'MThd') return [];
  pos = 4; readU32();
  const format = readU16();
  const numTracks = readU16();
  const ticksPerBeat = readU16();
  let usPerBeat = 500000;
  for (let t = 0; t < numTracks; t++) {
    if (String.fromCharCode(...bytes.slice(pos, pos + 4)) !== 'MTrk') break;
    pos += 4;
    const trackLen = readU32();
    const trackEnd = pos + trackLen;
    let timeSec = 0;
    let lastStatus = 0;
    const activeNotes = {};
    while (pos < trackEnd) {
      const delta = readVarLen();
      timeSec += (delta / ticksPerBeat) * (usPerBeat / 1_000_000);
      let status = bytes[pos];
      if (status < 0x80) { status = lastStatus; } else { pos++; lastStatus = status; }
      const type = status & 0xf0;
      if (type === 0x90) {
        const note = bytes[pos++]; const vel = bytes[pos++];
        if (vel > 0) { activeNotes[note] = { start: timeSec, velocity: vel }; }
        else if (activeNotes[note]) { notes.push({ pitch: note, start: activeNotes[note].start, end: timeSec, velocity: activeNotes[note].velocity }); delete activeNotes[note]; }
      } else if (type === 0x80) { const note = bytes[pos++]; pos++;
        if (activeNotes[note]) { notes.push({ pitch: note, start: activeNotes[note].start, end: timeSec, velocity: activeNotes[note].velocity }); delete activeNotes[note]; }
      } else if (type === 0xb0 || type === 0xe0) { pos += 2; }
      else if (type === 0xc0 || type === 0xd0) { pos += 1; }
      else if (status === 0xff) { const mt = bytes[pos++]; const len = readVarLen();
        if (mt === 0x51 && len === 3) { usPerBeat = (bytes[pos] << 16) | (bytes[pos+1] << 8) | bytes[pos+2]; }
        pos += len;
      } else if (status === 0xf0 || status === 0xf7) { pos += readVarLen(); }
      else { pos++; }
    }
    pos = trackEnd;
  }
  return notes;
}

window.addEventListener('resize', () => draw());
draw();
</script>
</body>
</html>
